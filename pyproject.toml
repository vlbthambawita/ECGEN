[build-system]
requires = ["setuptools>=61", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "ecggen"
version = "0.1.0"
description = "ECG generation and modeling experiments"
requires-python = ">=3.8"
dependencies = [
    "torch",
    "pyyaml",
    "pytorch-lightning",
    "pandas",
    "scikit-learn",
    "wfdb",
]

