# VAE1D Large Configuration

model:
  type: vae
  architecture: vae_1d
  
  # Larger model architecture
  in_channels: 12
  base_channels: 128
  latent_channels: 16
  channel_multipliers: [1, 2, 4, 8]
  num_res_blocks: 3
  
  # Training hyperparameters
  lr: 0.0001
  kl_weight: 0.0001
  b1: 0.9
  b2: 0.999
